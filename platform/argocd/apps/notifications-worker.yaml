apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notifications-worker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GomezJoaquin/pipeforge.git
    targetRevision: main
    path: platform/manifests
    directory:
      include: notifications-worker.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
